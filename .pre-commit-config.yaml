repos:
  - repo: local
    hooks:
      - id: encoding-guard
        name: encoding-guard (utf-8 without bom)
        entry: python scripts/check_text_encoding.py
        language: system
        pass_filenames: false
      - id: mojibake-guard
        name: mojibake-guard (corrupted japanese markers)
        entry: python scripts/check_mojibake_markers.py
        language: system
        pass_filenames: false

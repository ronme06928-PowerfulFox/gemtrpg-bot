name: Skill Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run encoding guard
        run: python scripts/check_text_encoding.py

      - name: Run mojibake guard
        run: python scripts/check_mojibake_markers.py

      - name: Run skill catalog smoke tests
        run: python -m pytest -q tests/test_skill_catalog_smoke.py

      - name: Run Phase3 strict rehearsal tests
        run: python -m pytest -q tests/test_phase3_strict_rehearsal.py

      - name: Run skill catalog lint (schema/reference errors only, no market-rate warnings)
        run: python scripts/skill_catalog_tool.py lint

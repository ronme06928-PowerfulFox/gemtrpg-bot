name: Skill Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run skill catalog smoke tests
        run: pytest -q tests/test_skill_catalog_smoke.py

      - name: Run Phase3 strict rehearsal tests
        run: pytest -q tests/test_phase3_strict_rehearsal.py
